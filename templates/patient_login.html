<!DOCTYPE html>
<html>
<head>
    <title>Patient Login - Hospital System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #28a745; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background-color: #218838; }
        .error { color: #dc3545; margin-bottom: 20px; display: none; }
        .link { margin-top: 20px; display: block; color: #007bff; text-decoration: none; }
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Patient Portal 🏥</h2>
        <div id="error-msg" class="error"></div>
        <form onsubmit="handleLogin(event)">
            <input type="number" id="patient_id" placeholder="Patient ID" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <a href="/patient/signup" class="link">First time? Activate Account</a>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const patient_id = document.getElementById('patient_id').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            try {
                const response = await fetch('/patient/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patient_id, password })
                });

                const result = await response.json();
                if (result.success) {
                    window.location.href = '/patient/dashboard';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                errorDiv.textContent = 'Login failed. Try again.';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
